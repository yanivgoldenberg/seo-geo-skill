name: Monthly benchmark
on:
  schedule:
    - cron: '0 6 1 * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install
        run: pip install requests
      - name: Run 61-site benchmark
        timeout-minutes: 30
        run: |
          month=$(date -u +%Y-%m)
          python scripts/run_state_of_ai_search_2026.py \
            --out "docs/state-of-ai-search-history/${month}.csv"
      - name: Commit and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/state-of-ai-search-history/
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          git commit -m "chore: monthly benchmark snapshot $(date -u +%Y-%m)"
          git push
