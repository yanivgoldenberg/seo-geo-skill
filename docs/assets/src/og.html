<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}body{margin:0;background:#000}</style></head>
<body>
<div style="--cy:#00F7D2; --grad-end:#00D9FF; --bg:#000000; --line:rgba(255,255,255,0.09); --ink:#FFFFFF; --body:#C5C5C5; --muted:#8A8A8A; position:relative; width:1200px; height:630px; background:var(--bg); overflow:hidden; color:var(--ink); display:flex; flex-direction:column; justify-content:center; padding:0 88px; font-family:'Inter',sans-serif; -webkit-font-smoothing:antialiased;">
  <div style="position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px); background-size:48px 48px; -webkit-mask-image:radial-gradient(ellipse 80% 70% at 35% 45%,#000 30%,transparent 80%); mask-image:radial-gradient(ellipse 80% 70% at 35% 45%,#000 30%,transparent 80%);"></div>
  <div style="position:absolute; width:760px; height:760px; left:18%; top:50%; transform:translate(-50%,-50%); background:radial-gradient(circle,rgba(0,247,210,.15) 0%,rgba(0,247,210,.04) 38%,transparent 66%); filter:blur(8px);"></div>
  <div style="position:relative; display:flex; flex-direction:column; gap:2px; margin-bottom:34px;">
    <div style="font-size:30px; font-weight:700; letter-spacing:-0.02em;">seo-geo-skill</div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:22px; color:var(--cy);">/seo-geo</div>
  </div>
  <h1 style="position:relative; margin:0; font-size:72px; font-weight:900; letter-spacing:-0.03em; line-height:1.04; max-width:640px;">Top SaaS sites are <span style="color:var(--cy);">failing</span> AI Search Readiness</h1>
  <p style="position:relative; margin:24px 0 0; font-size:28px; color:var(--body); font-weight:400; max-width:600px; line-height:1.35; font-variant-numeric:tabular-nums;">We benchmarked 61. OpenAI and Perplexity score 7/100 each.</p>
  <div style="position:absolute; right:96px; top:46%; transform:translateY(-50%); width:300px; height:300px; border-radius:50%; background:conic-gradient(from -90deg, var(--cy) 0% 56%, rgba(255,255,255,.07) 56% 100%); display:flex; align-items:center; justify-content:center; box-shadow:0 0 60px rgba(0,247,210,.18);">
    <div style="width:236px; height:236px; border-radius:50%; background:var(--bg); border:1px solid var(--line); display:flex; flex-direction:column; align-items:center; justify-content:center;">
      <div style="font-weight:900; font-size:78px; letter-spacing:-0.04em; line-height:1; color:var(--cy); font-variant-numeric:tabular-nums;">56%</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:15px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cy); margin-top:4px;">fail</div>
      <div style="font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--muted); margin-top:8px;">of 61 sites</div>
    </div>
  </div>
  <div style="position:absolute; left:88px; right:88px; bottom:40px; display:flex; align-items:center; justify-content:space-between; font-size:21px;">
    <span style="display:flex; align-items:center; gap:14px;">
      <svg width="40" height="40" viewBox="0 0 1024 1024" fill="none"><rect x="200" y="318" width="360" height="84" rx="42" fill="#FFFFFF"></rect><rect x="200" y="470" width="360" height="84" rx="42" fill="#FFFFFF"></rect><rect x="200" y="622" width="360" height="84" rx="42" fill="#FFFFFF"></rect><path d="M660 380 L800 512 L660 644" stroke="#00F7D2" stroke-width="84" stroke-linecap="round" stroke-linejoin="round"></path></svg>
      <span style="font-weight:700; color:var(--ink);">Yaniv Goldenberg <span style="color:var(--cy); font-weight:500;">&middot; Fractional CMO</span></span>
    </span>
    <span style="font-family:'JetBrains Mono',monospace; color:var(--muted);">yanivgoldenberg.com</span>
  </div>
</div>
</body></html>
