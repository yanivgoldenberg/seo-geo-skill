<style>

  .brand{position:relative;display:flex;flex-direction:column;gap:2px;margin-bottom:34px}
  .brand .name{font-size:30px;font-weight:700;letter-spacing:-.02em}

  h1{position:relative;font-size:72px;font-weight:800;letter-spacing:-.03em;line-height:1.04;max-width:1000px}
  h1 .c{color:var(--cyan)}
  .sub{position:relative;margin-top:24px;font-size:28px;color:var(--muted);font-weight:400;max-width:960px;line-height:1.35}
  .pills{position:relative;margin-top:42px;display:flex;gap:14px}
  .pill{padding:10px 22px;border-radius:999px;background:var(--glass);border:1px solid var(--glass-bd);backdrop-filter:blur(12px);font-size:20px;font-weight:600;letter-spacing:.08em;color:#E5E7EB}
</style>
</head>
<body>
  <div class="frame">
